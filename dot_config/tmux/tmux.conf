# ==============================================================================
# tmux.conf — auto-discovered by tmux >= 3.1 at $XDG_CONFIG_HOME/tmux/tmux.conf
# ==============================================================================
# Layout:
#   1. Terminal capabilities       (true color)
#   2. Behavior                    (mouse, indices, etc.)
#   3. Prefix + key bindings       (windows / panes / copy-mode)
#   4. Plugins                     (declared via TPM)
#   5. Plugin-specific options     (yank settings)
#   6. TPM bootstrap + init        (must be the LAST block)
# ==============================================================================


# ==============================================================================
# 1. Terminal capabilities
# ==============================================================================
# True 24-bit (RGB) color for any terminal whose TERM starts with "xterm".
# This covers xterm-256color, xterm-ghostty (Ghostty's default TERM), etc.
# `-sa` = server-level, append (don't replace existing overrides).
set-option -sa terminal-overrides ",xterm*:Tc"


# ==============================================================================
# 2. Behavior
# ==============================================================================
set -g mouse on                                    # Mouse: select pane, scroll, drag-resize, click on status

# --- Window / pane indexing ---
# Start at 1 instead of 0 so window numbers line up with the number-row keys
# on the keyboard (prefix + 1 selects the first window, etc.).
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on                  # Close window 2 of [1,2,3] → renumbers [1,2]

# --- Sensible additions (do NOT conflict with anything below) ---
# OSC 52 system-clipboard support (works in Ghostty, iTerm2, kitty, modern
# terminal emulators). Combined with @yank_selection 'clipboard' below, copy
# operations land in the macOS pasteboard.
set -g set-clipboard on
# Use vi-style key navigation in the status line / prompt too (consistent with
# mode-keys vi set further down). Affects e.g. `prefix + :` command prompt.
set -g status-keys vi


# ==============================================================================
# 3. Prefix + key bindings
# ==============================================================================
# --- Prefix: Ctrl-Space (more ergonomic than the default Ctrl-b) ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Window switching: Shift-Alt + H / L (no prefix needed) ---
bind -n M-H previous-window
bind -n M-L next-window

# --- Splits open in the current pane's working directory ---
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"

# --- Reload config without restarting tmux (prefix + r) ---
bind r source-file "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/tmux.conf" \; display "tmux.conf reloaded"

# --- Vim-style pane resize (prefix + H/J/K/L, repeatable with -r) ---
# Doesn't conflict with vim-tmux-navigator below — that plugin uses unprefixed
# Ctrl-h/j/k/l for seamless vim/tmux pane traversal.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode: vi-style ---
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel


# ==============================================================================
# 4. Plugins (declared here, installed via TPM block at the bottom)
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'                  # The plugin manager itself
set -g @plugin 'tmux-plugins/tmux-sensible'        # Universally agreeable defaults
set -g @plugin 'christoomey/vim-tmux-navigator'    # Seamless Ctrl-h/j/k/l between vim ↔ tmux panes
set -g @plugin 'dreamsofcode-io/catpuccin-tmux'    # Catppuccin theme (note: repo has typo — "catpuccin")
set -g @plugin 'tmux-plugins/tmux-yank'            # Better copy-to-clipboard (uses pbcopy/xclip/wl-copy)


# ==============================================================================
# 5. Plugin-specific options
# ==============================================================================
# --- tmux-yank ---
set -g @yank_action 'copy-pipe'                    # Stay in copy mode after yank (default would cancel it)
set -g @yank_with_mouse off                        # Don't yank automatically on mouse selection
set -g @yank_selection 'clipboard'                 # Copy to system clipboard (macOS pasteboard / X11 CLIPBOARD)


# ==============================================================================
# 6. TPM bootstrap + init  (MUST be the last block in this file)
# ==============================================================================
# TPM lookup priority:
#   - macOS: brew install tpm  → $HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm
#   - Linux: git clone         → ~/.tmux/plugins/tpm/tpm
#
# Plugins are installed by TPM into ~/.tmux/plugins/ (TPM's default location).
# After tmux starts, hit `prefix + I` to (re)install configured plugins.
#
# Auto-bootstrap on a fresh machine: if no TPM is found anywhere, clone it to
# ~/.tmux/plugins/tpm and immediately install the configured plugins.
if "test ! -e $HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm -a ! -d $HOME/.tmux/plugins/tpm" \
   "run 'mkdir -p $HOME/.tmux/plugins && git clone --depth 1 https://github.com/tmux-plugins/tpm $HOME/.tmux/plugins/tpm && $HOME/.tmux/plugins/tpm/bin/install_plugins'"

# Run TPM. Prefer the brew-installed path on macOS; fall back to the
# git-cloned path otherwise. (`if` here is tmux's if-shell with else.)
if "test -e $HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm" \
   "run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'" \
   "run '$HOME/.tmux/plugins/tpm/tpm'"
